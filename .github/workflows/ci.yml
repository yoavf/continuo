name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Package (unsigned)
        run: ./Scripts/package-app.sh

      - name: Launch smoke test
        run: ./Scripts/smoke-test.sh

      - name: Upload unsigned app
        uses: actions/upload-artifact@v4
        with:
          name: Continuo-unsigned
          path: dist/Continuo.app
