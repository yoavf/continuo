name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Package (unsigned)
        run: ./Scripts/package-app.sh

      - name: Launch smoke test
        run: ./Scripts/smoke-test.sh

      - name: Archive preview app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/Continuo.app dist/Continuo-preview.zip

      - name: Upload preview app
        id: preview-artifact
        uses: actions/upload-artifact@v7
        with:
          name: Continuo-preview-${{ github.event.pull_request.number || github.run_number }}
          path: dist/Continuo-preview.zip
          archive: false
          retention-days: 7
          if-no-files-found: error

      - name: Comment preview download on PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.preview-artifact.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- continuo-preview-build -->';
            const headSha = context.payload.pull_request.head.sha;
            const body = `${marker}
            ### Download this PR build

            [Download Continuo preview](${process.env.ARTIFACT_URL})

            Unsigned macOS development build for commit \`${headSha.slice(0, 7)}\`. The link expires after 7 days and requires GitHub sign-in.`;
            const coordinates = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };
            const comments = await github.paginate(
              github.rest.issues.listComments,
              coordinates
            );
            const existing = comments.find(
              comment => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ ...coordinates, body });
            }
