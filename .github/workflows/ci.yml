name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Package (unsigned)
        run: ./Scripts/package-app.sh

      - name: Launch smoke test
        run: ./Scripts/smoke-test.sh

      - name: Import Developer ID certificate
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login == github.repository_owner
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/continuo-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write App Store Connect API key
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login == github.repository_owner
        env:
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Sign and notarize preview
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login == github.repository_owner
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: ./Scripts/sign-and-notarize.sh

      - name: Upload preview app
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login == github.repository_owner
        id: preview-artifact
        uses: actions/upload-artifact@v7
        with:
          name: Continuo-preview-${{ github.event.pull_request.number || github.run_number }}
          path: dist/Continuo.dmg
          archive: false
          retention-days: 7
          if-no-files-found: error

      - name: Comment preview download on PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login == github.repository_owner
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.preview-artifact.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- continuo-preview-build -->';
            const headSha = context.payload.pull_request.head.sha;
            const body = `${marker}
            ### Download this PR build

            [Download Continuo preview](${process.env.ARTIFACT_URL})

            Signed and notarized macOS preview for commit \`${headSha.slice(0, 7)}\`. The link expires after 7 days and requires GitHub sign-in.`;
            const coordinates = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };
            const comments = await github.paginate(
              github.rest.issues.listComments,
              coordinates
            );
            const existing = comments.find(
              comment => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ ...coordinates, body });
            }
