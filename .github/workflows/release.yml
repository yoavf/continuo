name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Test
        run: swift test

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/continuo-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write App Store Connect API key
        env:
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Package
        run: ./Scripts/package-app.sh

      - name: Launch smoke test
        run: ./Scripts/smoke-test.sh

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST="dist/Continuo.app/Contents/Info.plist"
          /usr/bin/plutil -replace CFBundleShortVersionString -string "$VERSION" "$PLIST"
          /usr/bin/plutil -replace CFBundleVersion -string "${GITHUB_RUN_NUMBER}" "$PLIST"

      - name: Sign & notarize
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: ./Scripts/sign-and-notarize.sh

      - name: Generate signed update feed
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: ./Scripts/generate-appcast.sh "$GITHUB_REF_NAME"

      - name: Verify Gatekeeper acceptance
        run: spctl --assess --type execute --verbose=4 dist/Continuo.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Continuo-dmg
          path: |
            dist/Continuo.dmg
            dist/appcast.xml

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/Continuo.dmg dist/appcast.xml \
            --title "Continuo $GITHUB_REF_NAME" \
            --generate-notes

      - name: Bump Homebrew cask
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          : "${HOMEBREW_TAP_TOKEN:?HOMEBREW_TAP_TOKEN secret is required (fine-grained PAT with contents:write on yoavf/homebrew-tap)}"

          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 dist/Continuo.dmg | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yoavf/homebrew-tap.git" tap
          ./Scripts/render-homebrew-cask.sh "$VERSION" "$SHA256" tap/Casks/continuo.rb

          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Casks/continuo.rb
          if git -C tap diff --cached --quiet; then
            echo "Cask already up to date"
            exit 0
          fi
          git -C tap commit -m "continuo $VERSION"
          git -C tap push
