name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Test
        run: swift test

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/continuo-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write App Store Connect API key
        env:
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Package
        run: ./Scripts/package-app.sh

      - name: Launch smoke test
        run: ./Scripts/smoke-test.sh

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST="dist/Continuo.app/Contents/Info.plist"
          /usr/bin/plutil -replace CFBundleShortVersionString -string "$VERSION" "$PLIST"
          /usr/bin/plutil -replace CFBundleVersion -string "${GITHUB_RUN_NUMBER}" "$PLIST"

      - name: Sign & notarize
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: ./Scripts/sign-and-notarize.sh

      - name: Verify Gatekeeper acceptance
        run: spctl --assess --type execute --verbose=4 dist/Continuo.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Continuo-dmg
          path: dist/Continuo.dmg

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/Continuo.dmg \
            --title "Continuo $GITHUB_REF_NAME" \
            --generate-notes
